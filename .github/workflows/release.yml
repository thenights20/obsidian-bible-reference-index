name: Publicar versão

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4

      - name: Preparar o Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Conferir e compilar
        run: npm run check

      - name: Ler a versão do plugin
        shell: bash
        run: echo "PLUGIN_VERSION=$(node -p \"require('./manifest.json').version\")" >> "$GITHUB_ENV"

      - name: Criar ou atualizar a versão
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "$PLUGIN_VERSION" >/dev/null 2>&1; then
            gh api --method PATCH "/repos/$GITHUB_REPOSITORY/git/refs/tags/$PLUGIN_VERSION" \
              -f sha="$GITHUB_SHA" \
              -F force=true
            gh release upload "$PLUGIN_VERSION" main.js manifest.json styles.css --clobber
          else
            gh release create "$PLUGIN_VERSION" main.js manifest.json styles.css \
              --target "$GITHUB_SHA" \
              --title "$PLUGIN_VERSION" \
              --generate-notes
          fi
